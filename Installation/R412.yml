name: R412

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # ----------------------------------------------------------
  # Core
  # ----------------------------------------------------------
  - python=3.10
  - pip
  - r-base=4.1.2

  # ----------------------------------------------------------
  # Compilers/build tools
  # ----------------------------------------------------------
  - c-compiler
  - cxx-compiler
  - fortran-compiler
  - gcc_linux-64
  - gxx_linux-64
  - gfortran_linux-64
  - make
  - cmake
  - pkg-config
  - autoconf
  - automake
  - libtool
  - m4
  - sed
  - perl
  - tar
  - wget
  - rsync

  # ----------------------------------------------------------
  # System libraries used by R packages
  # IMPORTANT: use jpeg, not libjpeg-turbo, to avoid clobber conflicts.
  # ----------------------------------------------------------
  - curl
  - libcurl
  - openssl
  - libssh2
  - libgit2
  - libxml2
  - libuv
  - udunits2
  - hdf5
  - graphviz
  - geos
  - r-rgeos
  - fontconfig
  - freetype
  - harfbuzz
  - fribidi
  - cairo
  - pango
  - libpng
  - libtiff
  - jpeg
  - zlib
  - xz
  - bzip2
  - ncurses
  - readline
  - tk

  # ----------------------------------------------------------
  # R recommended/core packages.
  # These are the foundation; do not purge them manually.
  # ----------------------------------------------------------
  - r-lattice
  - r-mass
  - r-matrix
  - r-mgcv
  - r-nlme
  - r-survival

  # ----------------------------------------------------------
  # R bootstrap/build helpers
  # ----------------------------------------------------------
  - r-remotes
  - r-biocmanager
  - r-curl
  - r-httr
  - r-openssl
  - r-xml2
  - r-rcpp
  - r-rcppeigen
  - r-rcpparmadillo
  - r-rcppparallel
  - r-bh
  - r-cli
  - r-rlang
  - r-glue
  - r-lifecycle
  - r-vctrs
  - r-tibble
  - r-pillar
  - r-pkgconfig
  - r-data.table
  - r-matrixstats
  - r-systemfonts
  - r-textshaping
  - r-ragg
  - r-units
  - r-hdf5r

  # ----------------------------------------------------------
  # CRAN packages that are painful to compile repeatedly
  # or are needed by Seurat/Maaslin2/pbkrtest.
  # ----------------------------------------------------------
  - r-minqa
  - r-nloptr
  - r-numderiv
  - r-lme4
  - r-tmb
  - r-pbkrtest
  - r-car
  - r-cardata
  - r-statmod
  - r-future
  - r-future.apply
  - r-progressr
  - r-globals
  - r-listenv
  - r-parallelly
  - r-ggplot2
  - r-gtable
  - r-isoband
  - r-scales
  - r-cowplot
  - r-patchwork
  - r-ggrepel
  - r-viridis
  - r-pheatmap
  - r-dplyr
  - r-tidyr
  - r-purrr
  - r-tidyselect
  - r-stringi
  - r-stringr
  - r-broom
  - r-foreach
  - r-doparallel
  - r-iterators
  - r-optparse
  - r-logging
  - r-vegan
  - r-ade4
  - r-shiny
  - r-miniui
  - r-htmltools
  - r-fastmap
  - r-processx
  - r-promises
  - r-ggpubr
  - r-hdf5r
  - r-reticulate
  - r-rann
  - r-rcppannoy
  - r-rcppprogress
  - r-fitdistrplus
  - r-ggridges
  - r-ica
  - r-lmtest
  - r-plotly
  - r-rocr
  - r-leiden
  - r-uwot
  - r-irlba
  - r-rspectra
  - r-rtsne
  - r-fnn
  - r-spam
  - r-deldir
  - r-polyclip
  - r-spatstat.data
  - r-spatstat.utils
  - r-spatstat.sparse
  - r-spatstat.random
  - r-spatstat.geom
  - r-spatstat.explore

  # ----------------------------------------------------------
  # Bioconductor 3.14 / R 4.1 stack via Bioconda.
  # These reduce source compilation failures.
  # ----------------------------------------------------------
  - bioconductor-biocgenerics
  - bioconductor-s4vectors
  - bioconductor-iranges
  - bioconductor-xvector
  - bioconductor-genomeinfodbdata
  - bioconductor-genomeinfodb
  - bioconductor-genomicranges
  - bioconductor-matrixgenerics
  - bioconductor-delayedarray
  - bioconductor-summarizedexperiment
  - bioconductor-biobase
  - bioconductor-rhdf5
  - bioconductor-rhdf5filters
  - bioconductor-rhdf5lib
  - bioconductor-rprotobuflib
  - bioconductor-graph
  - bioconductor-rgraphviz
  - bioconductor-kegggraph
  - bioconductor-cytolib=2.6.2
  - bioconductor-flowcore=2.6.0
  - bioconductor-cmapr=1.6.0

  # ----------------------------------------------------------
  # Tools already present in the older MTD R412 environment
  # ----------------------------------------------------------
  - kraken2=2.1.2

